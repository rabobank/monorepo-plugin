<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="80" height="80" viewBox="0 0 80 80"
     role="img" aria-label="Plugin logo: filter monorepo">
    <defs>
        <!-- Rich gradient for dark theme -->
        <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#7C3AED"/>
            <stop offset="100%" stop-color="#E11D48"/>
        </linearGradient>
    </defs>

    <!-- Keep at least 4px transparent padding (scaled from 2px) -->
    <rect x="8" y="8" width="64" height="64" rx="16" fill="url(#g2)"/>

    <!-- Icon marks -->
    <g fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <!-- Monorepo / branch spine -->
        <path d="M24 20v40"/>
        <!-- Branch stubs -->
        <path d="M24 28h16 M24 40h24 M24 52h20"/>
        <!-- Nodes -->
        <circle cx="24" cy="28" r="3" fill="#FFFFFF" stroke="none"/>
        <circle cx="24" cy="40" r="3" fill="#FFFFFF" stroke="none"/>
        <circle cx="24" cy="52" r="3" fill="#FFFFFF" stroke="none"/>
        <!-- Filter funnel -->
        <path d="M48 24h16l-4 8h-8z" stroke="#3574F0"/>
        <path d="M56 34v22" stroke="#3574F0"/>
    </g>
</svg>
